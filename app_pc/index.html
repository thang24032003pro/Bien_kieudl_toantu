<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Simple Calculator</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        input { padding: 8px; margin-bottom: 10px; width: 100px; }
        button { padding: 8px 15px; cursor: pointer; }
        h3 { color: #333; }
    </style>
</head>
<body>

    <h2>Caculator</h2>
    <input type="number" id="num1" placeholder="Number 1">
    <input type="number" id="num2" placeholder="Number 2">
    <br>
    <button onclick="calculate('add')">Tính tổng</button>
    <button onclick="calculate('sub')">Tính hiệu</button>
    <button onclick="calculate('mul')">Tính tích</button>
    <button onclick="calculate('div')">Tính thương</button>

    <h3>Result: <span id="result">0</span></h3>

    <script src="script.js"></script>
</body>
</html>
