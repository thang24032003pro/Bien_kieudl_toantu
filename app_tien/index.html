<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Currency Converter</title>
    <style>
        table { width: 50%; margin: 20px auto; }
        input, select, button { width: 100%; padding: 5px; }
        #result { color: blue; font-weight: bold; text-align: center; margin-top: 10px; }
    </style>
</head>
<body>

    <table>
        <tr>
            <th>Amount</th>
            <th>From Currency</th>
            <th>To Currency</th>
            <th></th>
        </tr>
        <tr>
            <td><input type="number" id="amount"></td>
            <td>
                <select id="from">
                    <option value="VND">VietNam</option>
                    <option value="USD">USD</option>
                </select>
            </td>
            <td>
                <select id="to">
                    <option value="USD">USD</option>
                    <option value="VND">VietNam</option>
                </select>
            </td>
            <td><button onclick="convertCurrency()">Convert</button></td>
        </tr>
    </table>

    <div id="result"></div>

    <script src="script.js"></script>
</body>
</html>
